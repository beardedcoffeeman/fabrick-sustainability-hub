name: Refresh EPC retrofit map

# Weekly refresh of the EPC retrofit-market leaderboard.
# scripts/ingest-epc.ts hits the MHCLG API across ~30 UK cities and
# rewrites src/data/epc-snapshot.json. Needs EPC_API_TOKEN set as a
# repo secret.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run EPC ingest
        env:
          EPC_API_TOKEN: ${{ secrets.EPC_API_TOKEN }}
        run: npx tsx scripts/ingest-epc.ts
      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/epc-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes - EPC distribution unchanged this week."
          else
            git commit -m "chore: refresh EPC retrofit snapshot [skip ci]"
            git push
          fi
