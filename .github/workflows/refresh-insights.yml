name: Refresh homepage insights

# Monthly regeneration of the three "Latest insights" cards on the
# homepage. Runs after the material prices refresh window so it picks
# up any fresh DBT data.

on:
  schedule:
    - cron: "0 8 15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Generate insights
        run: npx tsx scripts/generate-insights.ts
      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/insights-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes to insights this month."
          else
            git commit -m "chore: refresh homepage insights [skip ci]"
            git push
          fi
